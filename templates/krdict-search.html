{% extends "base.html" %} {% block title %}사전 검색 | 오누리 한국어{% endblock
%} {% block content %}
<div class="max-w-6xl mx-auto px-4 py-10">
  <div
    class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-8"
  >
    <div>
      <h1 class="text-3xl font-bold text-gray-900">사전 검색</h1>
      <p class="text-sm text-gray-600 mt-2">
        한국어기초사전(Open API)에서 표제어와 뜻풀이를 빠르게 확인하세요.
      </p>
    </div>
  </div>

  <!-- Alerts Container -->
  <div id="alertsContainer" class="mb-4"></div>

  <section
    class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6 mb-6"
  >
    <form
      id="krdict-form"
      class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end"
    >
      <div class="md:col-span-5">
        <label class="text-xs font-semibold text-gray-500">검색어</label>
        <input
          type="text"
          id="krdict-query"
          class="mt-1 w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300"
          placeholder="예) 나무, 나무라다"
          required
        />
      </div>
      <div class="md:col-span-2">
        <label class="text-xs font-semibold text-gray-500">검색 대상</label>
        <select
          id="krdict-part"
          class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-3 text-sm bg-white"
        >
          <option value="">전체</option>
          <option value="word">어휘</option>
          <option value="ip">관용구/속담</option>
          <option value="dfn">뜻풀이</option>
          <option value="exam">용례</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="text-xs font-semibold text-gray-500">검색 방식</label>
        <select
          id="krdict-method"
          class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-3 text-sm bg-white"
        >
          <option value="">일치</option>
          <option value="include">포함</option>
          <option value="start">시작</option>
          <option value="end">끝</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="text-xs font-semibold text-gray-500">출력 건수</label>
        <select
          id="krdict-num"
          class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-3 text-sm bg-white"
        >
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="50">50</option>
        </select>
      </div>
      <div class="md:col-span-1">
        <button
          type="submit"
          id="krdict-submit"
          class="w-full px-4 py-3 rounded-xl bg-orange-500 text-white text-sm font-semibold hover:bg-orange-400 transition"
        >
          검색
        </button>
      </div>
    </form>
  </section>

  <section
    id="krdict-summary"
    class="text-sm text-gray-600 mb-4 hidden"
  ></section>

  <section id="krdict-results" class="grid grid-cols-1 gap-4"></section>
</div>

{% endblock %} {% block extra_js %}
<script>
  const form = document.getElementById("krdict-form");
  const queryInput = document.getElementById("krdict-query");
  const partSelect = document.getElementById("krdict-part");
  const methodSelect = document.getElementById("krdict-method");
  const numSelect = document.getElementById("krdict-num");
  const submitButton = document.getElementById("krdict-submit");
  const resultsEl = document.getElementById("krdict-results");
  const summaryEl = document.getElementById("krdict-summary");
  const alertsContainer = document.getElementById("alertsContainer");

  function clearResults() {
    resultsEl.innerHTML = "";
    summaryEl.classList.add("hidden");
    alertsContainer.innerHTML = "";
  }

  function renderItem(item) {
    const senses = Array.isArray(item.senses) ? item.senses : [];
    const senseList = senses
      .slice(0, 3)
      .map((sense) => {
        const order = sense.sense_order ? `${sense.sense_order}. ` : "";
        return `<li class="text-sm text-gray-700 leading-relaxed">${order}${
          sense.definition || ""
        }</li>`;
      })
      .join("");

    const example = item.example
      ? `<p class="text-sm text-gray-600 mt-2">용례: ${item.example}</p>`
      : "";
    const tags = [
      item.pos
        ? `<span class="px-2 py-1 rounded-full bg-gray-100 text-gray-600 text-xs">${item.pos}</span>`
        : "",
      item.word_grade
        ? `<span class="px-2 py-1 rounded-full bg-orange-50 text-orange-700 text-xs">${item.word_grade}</span>`
        : "",
    ]
      .filter(Boolean)
      .join(" ");

    const link = item.link
      ? `<a href="${item.link}" target="_blank" rel="noopener noreferrer" class="text-xs text-orange-600 hover:text-orange-500">사전 상세 보기 →</a>`
      : "";

    return `
      <article class="bg-white border border-gray-200 rounded-2xl shadow-sm p-5">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div>
            <h3 class="text-xl font-bold text-gray-900">${item.word || "—"}</h3>
            <p class="text-xs text-gray-500 mt-1">${
              item.pronunciation || ""
            }</p>
          </div>
          <div class="flex flex-wrap gap-2 items-center">${tags}</div>
        </div>
        ${senseList ? `<ul class="mt-3 space-y-1">${senseList}</ul>` : ""}
        ${example}
        <div class="mt-3">${link}</div>
      </article>
    `;
  }

  async function fetchResults(query) {
    const params = new URLSearchParams({
      q: query,
      start: "1",
      num: numSelect.value || "10",
    });

    if (partSelect.value) params.set("part", partSelect.value);
    if (methodSelect.value) params.set("method", methodSelect.value);

    const response = await fetch(`/api/krdict/search?${params.toString()}`);
    const data = await response.json();
    return { ok: response.ok, data };
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const query = queryInput.value.trim();
    if (!query) {
      AlertManager.warning(
        "검색어를 입력해주세요.",
        "검색어 필수",
        alertsContainer
      );
      return;
    }

    clearResults();
    LoadingManager.setButtonLoading(submitButton, "검색 중...");

    try {
      const result = await fetchResults(query);
      const payload = result.data || {};

      if (!result.ok || payload.error) {
        const message =
          (payload.error && payload.error.message) ||
          payload.error ||
          "검색 중 문제가 발생했습니다.";
        AlertManager.error(message, "검색 오류", alertsContainer);
        return;
      }

      const channel = payload.channel || {};
      const items = Array.isArray(payload.items) ? payload.items : [];
      summaryEl.textContent = `총 ${channel.total || 0}건 중 ${
        items.length
      }건 표시`;
      summaryEl.classList.remove("hidden");

      if (!items.length) {
        resultsEl.innerHTML =
          '<div class="text-sm text-gray-500">검색 결과가 없습니다.</div>';
        return;
      }

      resultsEl.innerHTML = items.map(renderItem).join("");
    } catch (error) {
      AlertManager.error(
        "검색 요청을 처리하지 못했습니다.",
        "오류",
        alertsContainer
      );
    } finally {
      LoadingManager.clearButtonLoading(submitButton);
    }
  });
</script>
{% endblock %}
