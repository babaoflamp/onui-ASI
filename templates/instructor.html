{% extends "base.html" %} {% block title %}교수 전용 대시보드{% endblock %} {%
block content %}
<div class="min-h-[70vh] bg-blue-50/30 text-gray-900">
  <div
    class="max-w-7xl mx-auto px-4 lg:px-6 py-6 grid grid-cols-1 lg:grid-cols-5 gap-6"
  >
    <!-- Sidebar -->
    <aside
      class="lg:col-span-1 rounded-2xl shadow-sm bg-white border border-blue-100 p-4 sticky top-20 h-fit"
    >
      <div
        class="flex items-center justify-between mb-4 border-b border-blue-50 pb-2"
      >
        <p class="text-sm font-bold text-blue-800">선생님 전용 패널</p>
      </div>
      <nav class="space-y-4 text-sm" id="instructorNav">
        <div class="space-y-1">
          <p class="px-3 text-[11px] uppercase tracking-[0.08em] text-gray-400">
            학습 성과 관리
          </p>
          <a
            href="/admin/lms?embed=1"
            target="instructorFrame"
            class="nav-item block px-3 py-2 rounded-xl hover:bg-blue-50 font-semibold text-blue-700 bg-blue-50/50"
            data-page="lms"
            >📊 학생 성적 및 출결</a
          >
          <a
            href="/admin/analytics?embed=1"
            target="instructorFrame"
            class="nav-item block px-3 py-2 rounded-xl hover:bg-blue-50"
            data-page="analytics"
            >📈 학습 통계 분석</a
          >
          <a
            href="/admin/users?embed=1"
            target="instructorFrame"
            class="nav-item block px-3 py-2 rounded-xl hover:bg-blue-50"
            data-page="users"
            >👥 수강생 명단 관리</a
          >
          <a
            href="/admin/recordings?embed=1"
            target="instructorFrame"
            class="nav-item block px-3 py-2 rounded-xl hover:bg-blue-50"
            data-page="recordings"
            >🎙️ 발음 평가 데이터</a
          >
        </div>
      </nav>
      <div class="mt-8">
        <button
          id="instructorLogout"
          class="w-full px-3 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-semibold shadow hover:opacity-90 transition-all"
        >
          로그아웃
        </button>
      </div>
    </aside>

    <!-- Content panel -->
    <section
      class="lg:col-span-4 rounded-2xl shadow-sm bg-white border border-blue-100 overflow-hidden"
    >
      <iframe
        id="instructorFrame"
        name="instructorFrame"
        src="/admin/lms?embed=1"
        class="w-full"
        scrolling="no"
        style="border: 0; display: block; overflow: hidden; height: 100vh"
      ></iframe>
    </section>
  </div>
</div>

<script>
  (function ensureInstructor() {
    const token = localStorage.getItem("auth_token");
    const role = localStorage.getItem("user_role");

    // Access check
    if (!token || role !== "instructor") {
      console.warn("Access restricted to instructors.");
      // If we are logged in as admin, we might want to stay here or go to /admin
      if (role === "system_admin") {
        window.location.href = "/admin";
        return;
      }
      window.location.href = "/login";
      return;
    }

    // Navigation highlighting
    const navItems = document.querySelectorAll(".nav-item");
    navItems.forEach((item) => {
      item.addEventListener("click", function () {
        navItems.forEach((i) => {
          i.classList.remove("font-semibold", "text-blue-700", "bg-blue-50/50");
        });
        this.classList.add("font-semibold", "text-blue-700", "bg-blue-50/50");
      });
    });
  })();

  // Auto-resize iframe to remove internal scrolling
  (function autoResizeIframe() {
    const iframe = document.getElementById("instructorFrame");
    if (!iframe) return;

    const resize = () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (!doc) return;
        const h = Math.max(
          doc.body?.scrollHeight || 0,
          doc.documentElement?.scrollHeight || 0,
          doc.body?.offsetHeight || 0,
          doc.documentElement?.offsetHeight || 0,
        );
        if (h && Math.abs(iframe.clientHeight - h) > 5) {
          iframe.style.height = h + "px";
        }
      } catch (e) {
        // Cross-origin or timing issue; ignore
      }
    };

    // Resize on load and after navigation changes
    iframe.addEventListener("load", () => {
      resize();
      // Observe mutations to adjust height on dynamic content
      try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        if (!doc) return;
        const observer = new MutationObserver(() => resize());
        observer.observe(doc.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
        });
        // Also poll briefly to catch late layout shifts
        let count = 0;
        const id = setInterval(() => {
          resize();
          if (++count > 20) clearInterval(id);
        }, 250);
      } catch (e) {
        // Fallback: simple delayed resizes
        setTimeout(resize, 300);
        setTimeout(resize, 1000);
      }
    });

    // Initial kick in case iframe is already loaded (bfcache or instant)
    setTimeout(resize, 300);
  })();

  document
    .getElementById("instructorLogout")
    ?.addEventListener("click", function () {
      localStorage.removeItem("auth_token");
      localStorage.removeItem("user_nickname");
      localStorage.removeItem("is_guest");
      localStorage.removeItem("is_admin");
      localStorage.removeItem("user_role");
      window.location.href = "/login";
    });
</script>
{% endblock %}
