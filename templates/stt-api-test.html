{% extends "base.html" %} {% block title %}STT API 테스트 - 오누이 AI{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto px-4 py-10">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Vosk STT 테스트</h1>
    <p class="text-sm text-gray-500 mt-2">
      Vosk(STT) 전용 테스트 페이지입니다.
    </p>
  </div>

  <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6 space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <label class="flex flex-col gap-2">
        <span class="text-xs font-semibold text-gray-600">Endpoint</span>
        <input
          id="sttEndpoint"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-gray-50"
          value="/api/stt/vosk"
          readonly
        />
      </label>
      <label class="flex flex-col gap-2">
        <span class="text-xs font-semibold text-gray-600">오디오 파일</span>
        <input id="sttAudioFile" type="file" accept="audio/*" class="text-sm" />
        <div class="flex items-center gap-2">
          <button
            id="sttRecordStart"
            type="button"
            class="px-3 py-2 rounded-lg bg-orange-500 text-white text-xs font-semibold hover:bg-orange-400"
          >
            🎙️ 녹음 시작
          </button>
          <button
            id="sttRecordStop"
            type="button"
            class="px-3 py-2 rounded-lg bg-orange-100 text-orange-700 text-xs font-semibold hover:bg-orange-200"
            disabled
          >
            ⏹️ 녹음 중지
          </button>
        </div>
        <div class="flex items-center gap-3 text-xs text-gray-600">
          <div class="flex-1 h-2 rounded-full bg-gray-100 overflow-hidden">
            <div
              id="sttLevelBar"
              class="h-full bg-emerald-500"
              style="width: 0%"
            ></div>
          </div>
          <span id="sttLevelText">0%</span>
          <span id="sttDurationText">0.0s</span>
        </div>
        <label class="flex items-center gap-2 text-xs text-gray-600">
          <input id="sttAnalyzeOnPlay" type="checkbox" class="rounded" />
          재생 시 평균 볼륨 측정
        </label>
        <span id="sttAvgLevelText" class="text-xs text-gray-500">평균 0%</span>
        <span
          id="sttAvgLevelLabel"
          class="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-600"
          >상태: 대기</span
        >
        <audio id="sttRecordedAudio" class="hidden w-full" controls></audio>
      </label>
    </div>
    <div class="flex items-center gap-3">
      <button
        id="sttSend"
        class="px-4 py-2 rounded-lg bg-orange-500 text-white text-sm font-semibold hover:bg-orange-400"
      >
        요청 보내기
      </button>
      <span id="sttStatus" class="text-xs text-gray-500"></span>
    </div>
  </div>

  <div class="mt-6 bg-white border border-gray-200 rounded-2xl shadow-sm p-6">
    <h2 class="text-sm font-semibold text-gray-800 mb-3">응답</h2>
    <pre
      id="sttResponse"
      class="text-xs text-gray-700 bg-gray-50 border border-gray-100 rounded-lg p-4 overflow-auto"
    >-</pre>
  </div>
</div>

<script>
  const endpointEl = document.getElementById("sttEndpoint");
  const responseEl = document.getElementById("sttResponse");
  const sendBtn = document.getElementById("sttSend");
  const statusEl = document.getElementById("sttStatus");
  const audioFileEl = document.getElementById("sttAudioFile");
  const recordStartEl = document.getElementById("sttRecordStart");
  const recordStopEl = document.getElementById("sttRecordStop");
  const recordedAudioEl = document.getElementById("sttRecordedAudio");
  const levelBarEl = document.getElementById("sttLevelBar");
  const levelTextEl = document.getElementById("sttLevelText");
  const durationTextEl = document.getElementById("sttDurationText");
  const analyzeOnPlayEl = document.getElementById("sttAnalyzeOnPlay");
  const avgLevelTextEl = document.getElementById("sttAvgLevelText");
  const avgLevelLabelEl = document.getElementById("sttAvgLevelLabel");
  let recorder = null;
  let recordedChunks = [];
  let audioContext = null;
  let analyser = null;
  let sourceNode = null;
  let levelTimer = null;
  let durationTimer = null;
  let startedAt = 0;
  let lastRecordedFile = null;

  function setStatus(text, isError) {
    statusEl.textContent = text;
    statusEl.classList.toggle("text-red-500", !!isError);
    statusEl.classList.toggle("text-gray-500", !isError);
  }

  async function sendRequest() {
    const endpoint = endpointEl.value;
    const url = endpoint;

    setStatus("요청 중...", false);
    responseEl.textContent = "";

    try {
      let response;
      const audioFile = audioFileEl.files[0];
      if (!audioFile) {
        setStatus("오디오 파일을 선택해주세요.", true);
        return;
      }
        if (audioFile.size < 512) {
          setStatus("오디오가 너무 짧습니다.", true);
          return;
        }
        const formData = new FormData();
        formData.append("file", audioFile);
      response = await fetch(url, { method: "POST", body: formData });

      const text = await response.text();
      let json;
      try {
        json = text ? JSON.parse(text) : {};
      } catch (_) {
        json = { raw: text };
      }
      responseEl.textContent = JSON.stringify(json, null, 2);
      if (!response.ok) {
        setStatus(`오류 응답 (${response.status})`, true);
        return;
      }
      setStatus("완료", false);
    } catch (err) {
      responseEl.textContent = err.message || "요청 실패";
      setStatus("요청 실패", true);
    }
  }

  async function startRecording() {
    if (recorder && recorder.state === "recording") return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      sourceNode = audioContext.createMediaStreamSource(stream);
      sourceNode.connect(analyser);
      recordedChunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = (event) => {
        if (event.data.size > 0) recordedChunks.push(event.data);
      };
      recorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: "audio/webm" });
        convertToWav(blob)
          .then((wavBlob) => {
            if (wavBlob.size < 512) {
              setStatus("녹음이 너무 짧습니다.", true);
              return;
            }
            const file = new File([wavBlob], "recording.wav", {
              type: "audio/wav",
            });
            const dt = new DataTransfer();
            dt.items.add(file);
            audioFileEl.files = dt.files;
            lastRecordedFile = file;
            recordedAudioEl.src = URL.createObjectURL(wavBlob);
            recordedAudioEl.classList.remove("hidden");
          })
          .catch((err) => {
            console.error("WAV 변환 오류:", err);
            setStatus("WAV 변환에 실패했습니다.", true);
          });
        stream.getTracks().forEach((track) => track.stop());
      };
      recorder.start();
      startedAt = performance.now();
      durationTextEl.textContent = "0.0s";
      levelTextEl.textContent = "0%";
      levelBarEl.style.width = "0%";
      if (levelTimer) clearInterval(levelTimer);
      if (durationTimer) clearInterval(durationTimer);
      levelTimer = setInterval(updateInputLevel, 120);
      durationTimer = setInterval(updateDuration, 100);
      recordStartEl.disabled = true;
      recordStopEl.disabled = false;
      setStatus("녹음 중...", false);
    } catch (err) {
      setStatus("마이크 권한을 확인해주세요.", true);
      console.error("녹음 시작 오류:", err);
    }
  }

  function stopRecording() {
    if (!recorder || recorder.state !== "recording") return;
    recorder.stop();
    if (levelTimer) clearInterval(levelTimer);
    if (durationTimer) clearInterval(durationTimer);
    recordStartEl.disabled = false;
    recordStopEl.disabled = true;
    setStatus("녹음 완료", false);
  }

  function updateDuration() {
    const seconds = (performance.now() - startedAt) / 1000;
    durationTextEl.textContent = `${seconds.toFixed(1)}s`;
  }

  function updateInputLevel() {
    if (!analyser) return;
    const data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);
    const percent = Math.min(100, Math.round(rms * 260));
    levelBarEl.style.width = `${percent}%`;
    levelTextEl.textContent = `${percent}%`;
    levelBarEl.classList.toggle("bg-amber-500", percent > 30 && percent <= 60);
    levelBarEl.classList.toggle("bg-red-500", percent > 60);
    levelBarEl.classList.toggle("bg-emerald-500", percent <= 30);
  }

  async function convertToWav(blob) {
    const arrayBuffer = await blob.arrayBuffer();
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    const channelData = audioBuffer.getChannelData(0);
    const wavBuffer = encodeWav(channelData, audioBuffer.sampleRate);
    return new Blob([wavBuffer], { type: "audio/wav" });
  }

  function encodeWav(samples, sampleRate) {
    const buffer = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buffer);

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    writeString(view, 0, "RIFF");
    view.setUint32(4, 36 + samples.length * 2, true);
    writeString(view, 8, "WAVE");
    writeString(view, 12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(view, 36, "data");
    view.setUint32(40, samples.length * 2, true);

    let offset = 44;
    for (let i = 0; i < samples.length; i++) {
      let s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      offset += 2;
    }
    return buffer;
  }

  sendBtn.addEventListener("click", sendRequest);
  recordStartEl.addEventListener("click", startRecording);
  recordStopEl.addEventListener("click", stopRecording);
  recordedAudioEl.addEventListener("play", () => {
    if (!analyzeOnPlayEl.checked) return;
    const file = audioFileEl.files[0] || lastRecordedFile;
    if (file) analyzeAverageLevel(file);
  });

  async function analyzeAverageLevel(file) {
    try {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      const arrayBuffer = await file.arrayBuffer();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
      const channelData = audioBuffer.getChannelData(0);
      let sum = 0;
      for (let i = 0; i < channelData.length; i++) {
        const v = channelData[i];
        sum += v * v;
      }
      const rms = Math.sqrt(sum / channelData.length);
      const percent = Math.min(100, Math.round(rms * 260));
      avgLevelTextEl.textContent = `평균 ${percent}%`;
      updateAvgLabel(percent);
    } catch (err) {
      avgLevelTextEl.textContent = "평균 분석 실패";
      updateAvgLabel(null, true);
      console.error("평균 볼륨 분석 오류:", err);
    }
  }

  function updateAvgLabel(percent, isError) {
    if (isError) {
      avgLevelLabelEl.textContent = "상태: 실패";
      avgLevelLabelEl.className =
        "text-[10px] px-2 py-0.5 rounded-full bg-red-100 text-red-600";
      return;
    }
    if (percent === null || percent === undefined) {
      avgLevelLabelEl.textContent = "상태: 대기";
      avgLevelLabelEl.className =
        "text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-600";
      return;
    }
    if (percent < 15) {
      avgLevelLabelEl.textContent = "상태: 너무 작음";
      avgLevelLabelEl.className =
        "text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-700";
      return;
    }
    if (percent < 45) {
      avgLevelLabelEl.textContent = "상태: 적정";
      avgLevelLabelEl.className =
        "text-[10px] px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700";
      return;
    }
    avgLevelLabelEl.textContent = "상태: 큼";
    avgLevelLabelEl.className =
      "text-[10px] px-2 py-0.5 rounded-full bg-blue-100 text-blue-700";
  }
</script>
{% endblock %}
