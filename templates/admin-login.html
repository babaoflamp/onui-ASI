{% extends "base.html" %} {% block title %}관리자 로그인 - 오누이 한국어{%
endblock %} {% block content %}
<div
  class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-orange-50 flex items-center justify-center px-4 py-10"
>
  <div class="w-full max-w-md">
    <!-- Alerts Container -->
    <div id="alertsContainer" class="mb-4"></div>

    <div class="bg-white border border-slate-200 shadow-2xl rounded-3xl p-8">
      <div class="text-center mb-8">
        <p
          class="text-xs font-semibold text-orange-600 uppercase tracking-widest"
        >
          Admin Access
        </p>
        <h1 class="text-3xl font-bold text-gray-900 mt-2">관리자 로그인</h1>
        <p class="text-gray-600 mt-2">관리자만 접근 가능한 영역입니다.</p>
      </div>

      <form id="adminLoginForm" class="space-y-5">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-gray-800">이메일</label>
          <input
            id="emailInput"
            name="email"
            type="email"
            required
            autocomplete="email"
            class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-orange-400 focus:border-transparent outline-none transition"
            placeholder="admin@example.com"
          />
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-gray-800">비밀번호</label>
          <input
            id="passwordInput"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            class="w-full border border-gray-200 rounded-lg px-4 py-3 focus:ring-2 focus:ring-orange-400 focus:border-transparent outline-none transition"
            placeholder="••••••••"
          />
        </div>

        <button
          id="adminLoginBtn"
          type="submit"
          class="w-full bg-gradient-to-r from-orange-500 to-pink-500 text-white font-semibold py-3 rounded-lg shadow-lg hover:from-orange-600 hover:to-pink-600 transition-all duration-200 active:scale-95"
        >
          관리자 로그인
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-gray-500">
        <p>일반 사용자 계정으로는 접근할 수 없습니다.</p>
        <a
          href="/login"
          class="text-orange-600 font-semibold hover:text-orange-700"
          >일반 로그인으로 이동 →</a
        >
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  (function () {
    const form = document.getElementById("adminLoginForm");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const alertsContainer = document.getElementById("alertsContainer");

    if (!form) return;

    // Clear field errors on input
    emailInput.addEventListener("input", () => {
      FormValidator.clearFieldError(emailInput);
    });
    passwordInput.addEventListener("input", () => {
      FormValidator.clearFieldError(passwordInput);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertsContainer.innerHTML = "";

      let hasErrors = false;

      if (!FormValidator.isRequired(emailInput.value)) {
        FormValidator.showFieldError(emailInput, "이메일은 필수입니다.");
        hasErrors = true;
      } else if (!FormValidator.isValidEmail(emailInput.value)) {
        FormValidator.showFieldError(
          emailInput,
          "유효한 이메일을 입력해주세요.",
        );
        hasErrors = true;
      }

      if (!FormValidator.isRequired(passwordInput.value)) {
        FormValidator.showFieldError(passwordInput, "비밀번호는 필수입니다.");
        hasErrors = true;
      }

      if (hasErrors) {
        ToastManager.error("입력 정보를 확인해주세요.");
        return;
      }

      const payload = {
        email: emailInput.value,
        password: passwordInput.value,
      };

      LoadingManager.setButtonLoading(adminLoginBtn, "로그인 중...");

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const error = await res
            .json()
            .catch(() => ({ detail: "로그인 실패" }));
          throw new Error(error.detail || "로그인에 실패했습니다.");
        }

        const data = await res.json();
        const role = data.role || "";
        const allowed = ["instructor", "system_admin"];
        if (!allowed.includes(role)) {
          throw new Error("접근 권한이 없습니다.");
        }

        localStorage.setItem("auth_token", data.token);
        localStorage.setItem("user_nickname", data.nickname);
        localStorage.setItem("user_role", role);
        if (role === "system_admin") {
          localStorage.setItem("is_admin", "true");
        } else {
          localStorage.removeItem("is_admin");
        }
        localStorage.removeItem("is_guest");

        LoadingManager.clearButtonLoading(adminLoginBtn);
        ToastManager.success(`${data.nickname}님 환영합니다!`);

        setTimeout(() => {
          if (role === "instructor") {
            window.location.href = "/instructor";
            return;
          }
          // default to system admin console
          window.location.href = "/admin";
        }, 1000);
      } catch (err) {
        LoadingManager.clearButtonLoading(adminLoginBtn);
        console.error(err);
        ToastManager.error(err.message || "로그인에 실패했습니다.");
      }
    });
  })();
</script>
{% endblock %}
