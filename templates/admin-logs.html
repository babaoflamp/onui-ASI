{% extends "base.html" %} {% block title %}로그 모니터링 - 관리자{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <div class="flex items-center justify-between mb-6">
    <div>
      <p
        class="text-xs font-semibold text-purple-600 uppercase tracking-widest"
      >
        Activity Logs
      </p>
      <h1 class="text-3xl font-bold text-gray-900 mt-1">로그 모니터링</h1>
      <p class="text-gray-600 mt-2">사용자 활동, API 오류, 시스템 이벤트</p>
    </div>
    <a
      href="/admin/dashboard"
      class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-semibold text-gray-700 hover:bg-gray-50"
      >← 대시보드</a
    >
  </div>

  <!-- Filter -->
  <div class="bg-white border border-gray-200 rounded-2xl p-4 mb-6 shadow-sm">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <select
        id="filterLevel"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-400"
      >
        <option value="">모든 로그</option>
        <option value="INFO">정보</option>
        <option value="WARNING">경고</option>
        <option value="ERROR">오류</option>
      </select>
      <input
        id="searchUser"
        type="text"
        placeholder="사용자명으로 검색..."
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-400"
      />
      <input
        id="searchAction"
        type="text"
        placeholder="액션으로 검색..."
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-400"
      />
      <button
        onclick="loadLogs()"
        class="px-4 py-2 rounded-lg bg-purple-500 text-white font-semibold hover:bg-purple-600"
      >
        🔍 검색
      </button>
    </div>
  </div>

  <!-- Logs Table -->
  <div
    class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden"
  >
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left font-semibold text-gray-700">
              시간
            </th>
            <th class="px-4 py-3 text-left font-semibold text-gray-700">
              레벨
            </th>
            <th class="px-4 py-3 text-left font-semibold text-gray-700">
              메시지
            </th>
            <th class="px-4 py-3 text-left font-semibold text-gray-700">
              상세
            </th>
          </tr>
        </thead>
        <tbody id="logsTbody" class="divide-y divide-gray-100 bg-white">
          <tr>
            <td
              class="px-4 py-3 text-gray-500"
              colspan="4"
              style="text-align: center"
            >
              로그를 불러오는 중...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div
    class="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-800"
  >
    <p>
      <strong>💡 정보:</strong> 로그는 <code>logs/detailed.log</code> 파일에서
      실시간으로 수집됩니다. 최근 100개 항목만 표시됩니다.
    </p>
  </div>
</div>
{% endblock %} {% block extra_js %}
<script>
  (function () {
    const tbody = document.getElementById("logsTbody");
    const filterLevelEl = document.getElementById("filterLevel");
    const searchUserEl = document.getElementById("searchUser");
    const searchActionEl = document.getElementById("searchAction");

    function ensureAdmin() {
      const token = localStorage.getItem("auth_token");
      const role =
        localStorage.getItem("user_role") ||
        (localStorage.getItem("is_admin") === "true" ? "system_admin" : "");
      if (!token || role !== "system_admin") {
        AlertManager.error("접근 권한이 없습니다.", "권한 오류", document.body);
        window.location.href = "/admin/login";
        return null;
      }
      return token;
    }

    window.loadLogs = async function () {
      const token = ensureAdmin();
      if (!token) return;

      const level = filterLevelEl.value || "";
      const search = searchUserEl.value || searchActionEl.value || "";

      try {
        const params = new URLSearchParams();
        if (level) params.append("level", level);
        if (search) params.append("search", search);
        params.append("lines", 100);

        const res = await fetch(`/api/admin/logs-tail?${params}`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (!res.ok) {
          const error = await res.json().catch(() => ({}));
          throw new Error(error.detail || "로그를 불러오지 못했습니다.");
        }

        const data = await res.json();
        const logs = data.logs || [];

        if (logs.length === 0) {
          tbody.innerHTML = `<tr><td class="px-4 py-3 text-gray-500" colspan="4" style="text-align: center;">로그가 없습니다.</td></tr>`;
          return;
        }

        tbody.innerHTML = logs
          .map((logLine) => {
            const parts =
              logLine.match(
                /(\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2})|(\[[\w_]+\])|(.+)/g
              ) || [];
            const time = parts[0] || "-";
            const type = parts[1]?.replace(/[\[\]]/g, "") || "-";
            const msg = logLine.substring(0, 100);

            return `
            <tr>
              <td class="px-4 py-3 text-gray-500 text-xs">${time}</td>
              <td class="px-4 py-3">
                <span class="inline-block px-2 py-1 rounded text-xs font-semibold ${
                  logLine.includes("ERROR")
                    ? "bg-red-100 text-red-800"
                    : logLine.includes("WARNING")
                    ? "bg-yellow-100 text-yellow-800"
                    : "bg-blue-100 text-blue-800"
                }">
                  ${
                    logLine.includes("ERROR")
                      ? "ERROR"
                      : logLine.includes("WARNING")
                      ? "WARNING"
                      : "INFO"
                  }
                </span>
              </td>
              <td class="px-4 py-3 text-gray-700 text-xs font-mono">${msg}</td>
              <td class="px-4 py-3 text-gray-500 text-xs">...</td>
            </tr>`;
          })
          .join("");
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td class="px-4 py-3 text-red-600" colspan="4" style="text-align: center;">${err.message}</td></tr>`;
      }
    };

    loadLogs();
  })();
</script>
{% endblock %}
