{% extends "base.html" %} {% block title %}시스템 설정 - 관리자 대시보드{%
endblock %} {% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="bg-white rounded-lg shadow-lg p-6">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">🔧 시스템 설정</h1>

    <div class="space-y-6">
      <!-- 서버 정보 -->
      <div class="border rounded-lg p-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">📊 서버 정보</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-gray-50 p-3 rounded">
            <p class="text-sm text-gray-600">서버 상태</p>
            <p class="text-lg font-semibold text-green-600">✓ 정상</p>
          </div>
          <div class="bg-gray-50 p-3 rounded">
            <p class="text-sm text-gray-600">CPU 사용률</p>
            <p class="text-lg font-semibold text-gray-900">42%</p>
          </div>
          <div class="bg-gray-50 p-3 rounded">
            <p class="text-sm text-gray-600">메모리 사용률</p>
            <p class="text-lg font-semibold text-gray-900">58%</p>
          </div>
          <div class="bg-gray-50 p-3 rounded">
            <p class="text-sm text-gray-600">디스크 사용률</p>
            <p class="text-lg font-semibold text-gray-900">71%</p>
          </div>
        </div>
      </div>

      <!-- 일반 설정 -->
      <div class="border rounded-lg p-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">⚙️ 일반 설정</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >애플리케이션 이름</label
            >
            <input
              type="text"
              value="OnUI AI Korean Learning"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >설명</label
            >
            <textarea
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none"
              rows="3"
            >
AI 기반 한국어 학습 플랫폼</textarea
            >
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >지원 메일</label
            >
            <input
              type="email"
              value="support@onui-ai.com"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none"
            />
          </div>
          <button
            class="w-full bg-gradient-to-r from-orange-500 to-pink-500 text-white py-2 rounded-lg hover:from-orange-600 hover:to-pink-600 transition-all"
          >
            저장
          </button>
        </div>
      </div>

      <!-- 보안 설정 -->
      <div class="border rounded-lg p-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">🔒 보안 설정</h3>
        <div class="space-y-4">
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded">
            <label class="text-sm font-medium text-gray-700">HTTPS 강제</label>
            <input type="checkbox" class="w-4 h-4 rounded" checked />
          </div>
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded">
            <label class="text-sm font-medium text-gray-700"
              >이메일 인증 필수</label
            >
            <input type="checkbox" class="w-4 h-4 rounded" checked />
          </div>
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded">
            <label class="text-sm font-medium text-gray-700"
              >로그인 재시도 제한</label
            >
            <input type="checkbox" class="w-4 h-4 rounded" checked />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >세션 타임아웃 (분)</label
            >
            <input
              type="number"
              value="30"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none"
            />
          </div>
          <button
            class="w-full bg-gradient-to-r from-orange-500 to-pink-500 text-white py-2 rounded-lg hover:from-orange-600 hover:to-pink-600 transition-all"
          >
            저장
          </button>
        </div>
      </div>

      <!-- 이메일 설정 -->
      <div class="border rounded-lg p-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">📧 이메일 설정</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >SMTP 서버</label
            >
            <input
              type="text"
              value="smtp.gmail.com"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2"
              >발신자 이메일</label
            >
            <input
              type="email"
              value="noreply@onui-ai.com"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none"
            />
          </div>
          <button
            class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white py-2 rounded-lg hover:from-emerald-600 hover:to-teal-600 transition-all"
          >
            연결 테스트
          </button>
        </div>
      </div>

      <!-- 시스템 유지보수 -->
      <div class="border rounded-lg p-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">
          🔧 시스템 유지보수
        </h3>
        <div class="space-y-3">
          <button
            class="w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600"
          >
            데이터베이스 최적화
          </button>
          <button
            class="w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600"
          >
            캐시 초기화
          </button>
          <button
            class="w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600"
          >
            오래된 로그 삭제
          </button>
        </div>
      </div>

      <!-- 백업 -->
      <div class="border rounded-lg p-4">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">💾 백업</h3>
        <div class="space-y-3">
          <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
            <span class="text-sm font-medium text-gray-700">마지막 백업</span>
            <span class="text-sm text-gray-600">2025-12-16 09:30</span>
          </div>
          <button
            class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600"
          >
            지금 백업
          </button>
          <button
            class="w-full bg-gradient-to-r from-orange-500 to-pink-500 text-white py-2 rounded-lg hover:from-orange-600 hover:to-pink-600 transition-all"
          >
            백업 목록 보기
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 역할 권한 확인
  function checkAdminAccess() {
    const role =
      localStorage.getItem("user_role") ||
      (localStorage.getItem("is_admin") === "true" ? "system_admin" : "");
    if (role !== "system_admin") {
      AlertManager.error("접근 권한이 없습니다.", "권한 오류", document.body);
      window.location.href = "/admin/login";
    }
  }

  document.addEventListener("DOMContentLoaded", checkAdminAccess);
</script>
{% endblock %}
