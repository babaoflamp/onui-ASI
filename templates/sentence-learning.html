{% extends "base.html" %} {% block title %}문장 학습 | 오누이 한국어{% endblock %} {% block content %}
<div id="alertsContainer"></div>
<div class="max-w-6xl mx-auto px-4 py-10">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">문장 학습</h1>
      <p class="text-sm text-gray-600 mt-2">
        문장별 점수와 히스토리를 확인하고 발음 연습까지 이어서 학습하세요.
      </p>
    </div>
    <button
      class="px-4 py-2 rounded-full border border-indigo-200 text-indigo-700 text-xs font-semibold bg-indigo-50"
    >
      LIVE SCORE BOARD
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <section class="lg:col-span-3 bg-white border border-gray-200 rounded-2xl shadow-sm p-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-gray-900">학습 문장 순위</h2>
        <button
          id="sortToggle"
          class="text-xs text-gray-500 hover:text-gray-700"
          type="button"
        >
          점수 높은 순 정렬
        </button>
      </div>
      <div class="grid grid-cols-3 gap-2 text-[11px] text-gray-400 px-2 pb-2">
        <span>문장</span>
        <span class="text-center">점수</span>
        <span class="text-right">히스토리</span>
      </div>
      <div id="sentenceRankList" class="space-y-2 max-h-[620px] overflow-y-auto pr-1"></div>
    </section>

    <section class="lg:col-span-6 bg-white border border-gray-200 rounded-2xl shadow-sm p-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 id="sentenceTitle" class="text-2xl font-bold text-gray-900"></h2>
          <p id="sentenceSubtitle" class="text-xs text-gray-500 mt-1"></p>
        </div>
        <button
          id="sentencePlayButton"
          class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-orange-500 text-white text-xs font-semibold hover:bg-orange-400 transition"
        >
          ▶ 발음 듣기
        </button>
      </div>

      <div class="space-y-3">
        <div class="bg-gray-50 rounded-xl p-4">
          <p class="text-xs text-gray-500 mb-1">해석</p>
          <p class="text-sm text-gray-700" id="sentenceTranslation"></p>
        </div>
        <div class="bg-gray-50 rounded-xl p-4">
          <p class="text-xs text-gray-500 mb-1">힌트</p>
          <p class="text-sm text-gray-700" id="sentenceHint"></p>
        </div>
        <div class="bg-gray-50 rounded-xl p-4">
          <p class="text-xs text-gray-500 mb-1">상황</p>
          <p class="text-sm text-gray-700" id="sentenceSituation"></p>
        </div>
      </div>

      <div class="mt-6 grid grid-cols-2 gap-3">
        <button
          id="sentenceRecordStart"
          class="px-4 py-3 rounded-xl bg-orange-500 text-white font-semibold hover:bg-orange-400 transition"
        >
          녹음 시작
        </button>
        <button
          id="sentenceRecordStop"
          class="px-4 py-3 rounded-xl bg-orange-100 text-orange-700 font-semibold hover:bg-orange-200 transition"
          disabled
        >
          녹음 종료
        </button>
      </div>

      <div class="mt-6 flex items-center justify-between text-sm">
        <button
          class="px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50"
        >
          ← 이전 학습
        </button>
        <button
          class="px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50"
        >
          처음 화면
        </button>
        <button
          class="px-4 py-2 rounded-full border border-gray-200 hover:bg-gray-50"
        >
          다음 학습 →
        </button>
      </div>
    </section>

    <aside class="lg:col-span-3 space-y-4">
      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs font-semibold text-indigo-600">CURRENT SENTENCE</p>
            <h3 id="currentSentenceLabel" class="text-base font-bold text-gray-900 mt-1">-</h3>
          </div>
          <span id="currentScore" class="px-3 py-1 rounded-full bg-emerald-50 text-emerald-700 text-xs font-semibold">-</span>
        </div>
        <div class="mt-4 flex flex-col gap-3">
          <label>
            <span class="text-xs text-gray-500">새 점수 (0~100)</span>
            <input
              id="scoreInput"
              type="number"
              min="0"
              max="100"
              placeholder="예: 85"
              class="mt-1 w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300"
            />
          </label>
          <button
            id="applyScore"
            class="px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-500"
          >
            입력 & 정렬
          </button>
        </div>
        <p class="text-xs text-gray-500 mt-3">
          점수를 입력하면 해당 문장의 점수가 업데이트되고 목록이 다시 정렬됩니다.
        </p>
      </div>

      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold text-gray-900" id="historyTitle">점수 히스토리</h3>
          <span class="text-[11px] text-gray-400">최근 10회</span>
        </div>
        <div id="historyChart" class="h-[220px] border border-gray-100 rounded-xl bg-gray-50"></div>
      </div>

      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-4">
        <h3 class="text-sm font-semibold text-gray-900 mb-3">문장 학습 도구</h3>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <button class="px-3 py-2 rounded-lg bg-emerald-50 text-emerald-700">대화 주제</button>
          <button class="px-3 py-2 rounded-lg bg-emerald-50 text-emerald-700">문장 패턴</button>
          <button class="px-3 py-2 rounded-lg bg-emerald-50 text-emerald-700">발음 팁</button>
          <button class="px-3 py-2 rounded-lg bg-emerald-50 text-emerald-700">롤플레이</button>
        </div>
      </div>

      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-4">
        <h3 class="text-sm font-semibold text-gray-900 mb-3">순위 정보</h3>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <button class="px-3 py-2 rounded-lg bg-blue-50 text-blue-700">세계 순위</button>
          <button class="px-3 py-2 rounded-lg bg-blue-50 text-blue-700">나라 순위</button>
          <button class="px-3 py-2 rounded-lg bg-blue-50 text-blue-700">한국 순위</button>
          <button class="px-3 py-2 rounded-lg bg-blue-50 text-blue-700">지역 순위</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<script>
  let sentences = [];
  let scoreHistory = {};
  let selectedIndex = 0;
  let sortByScore = true;

  const listEl = document.getElementById("sentenceRankList");
  const titleEl = document.getElementById("sentenceTitle");
  const subtitleEl = document.getElementById("sentenceSubtitle");
  const translationEl = document.getElementById("sentenceTranslation");
  const hintEl = document.getElementById("sentenceHint");
  const situationEl = document.getElementById("sentenceSituation");
  const currentSentenceLabelEl = document.getElementById("currentSentenceLabel");
  const currentScoreEl = document.getElementById("currentScore");
  const historyTitleEl = document.getElementById("historyTitle");
  const historyChartEl = document.getElementById("historyChart");
  const scoreInputEl = document.getElementById("scoreInput");
  const sortToggleEl = document.getElementById("sortToggle");
  const playButtonEl = document.getElementById("sentencePlayButton");
  const recordStartEl = document.getElementById("sentenceRecordStart");
  const recordStopEl = document.getElementById("sentenceRecordStop");
  let recorder = null;
  let recordedChunks = [];
  let recordedAudioBlob = null;

  function getHistory(sentenceId) {
    return scoreHistory[sentenceId] || [];
  }

  function getLatestScore(sentenceId) {
    const history = getHistory(sentenceId);
    return history.length ? history[0] : null;
  }

  function getSortedSentences() {
    const list = [...sentences];
    if (!sortByScore) return list;
    return list.sort((a, b) => {
      const aScore = getLatestScore(a.id) ?? -1;
      const bScore = getLatestScore(b.id) ?? -1;
      return bScore - aScore;
    });
  }

  function renderList() {
    const sorted = getSortedSentences();
    const selectedSentence = sorted[selectedIndex] || sorted[0];
    listEl.innerHTML = sorted
      .map((item, idx) => {
        const active = item.id === selectedSentence?.id;
        const latestScore = getLatestScore(item.id);
        const history = getHistory(item.id).slice(0, 3);
        const historyText = history.length ? history.join(" · ") : "-";
        return `
        <div class="flex items-center justify-between gap-2 px-3 py-2 border rounded-xl ${
          active ? "border-orange-300 bg-orange-50" : "border-gray-200"
        }">
          <button class="text-left flex-1" onclick="selectSentence(${idx})">
            <div class="font-semibold text-gray-800">${item.text}</div>
            <div class="text-[11px] text-gray-400">CEFR ${item.level || "-"}</div>
          </button>
          <div class="text-sm font-semibold text-gray-700 min-w-[48px] text-center">
            ${latestScore !== null ? latestScore + "점" : "-"}
          </div>
          <button
            class="text-xs font-semibold px-2 py-1 rounded-full border ${
              active
                ? "border-orange-300 text-orange-700"
                : "border-gray-200 text-gray-500"
            }"
            onclick="selectSentence(${idx})"
            title="최근 점수: ${historyText}"
          >
            속성
          </button>
        </div>
      `;
      })
      .join("");
  }

  function selectSentence(idx) {
    const sorted = getSortedSentences();
    selectedIndex = Math.max(0, Math.min(idx, sorted.length - 1));
    const item = sorted[selectedIndex];
    if (!item) return;
    titleEl.textContent = item.text || "-";
    subtitleEl.textContent = `${item.category || ""} · CEFR ${item.level || "-"}`;
    translationEl.textContent = item.translation || "해석이 없습니다.";
    hintEl.textContent = item.hint || "힌트가 없습니다.";
    situationEl.textContent = item.situation || "상황 설명이 없습니다.";
    currentSentenceLabelEl.textContent = item.text || "-";
    const latestScore = getLatestScore(item.id);
    currentScoreEl.textContent = latestScore !== null ? `${latestScore}점` : "-";
    historyTitleEl.textContent = `'${item.text}' 점수 히스토리`;
    renderHistoryChart(item.id);
    renderList();
  }

  function speakWithBrowserTTS(text) {
    console.warn("Browser TTS is disabled.");
    return;
  }

  async function playTTS(text) {
    if (!text) return;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    const originalLabel = playButtonEl ? playButtonEl.textContent : "";
    try {
      if (playButtonEl) {
        playButtonEl.disabled = true;
        playButtonEl.classList.add("opacity-70");
        playButtonEl.textContent = "⏳ 음성 생성 중...";
      }
      const fetchWithRetry = async (retries) => {
        let lastErr = null;
        for (let attempt = 0; attempt <= retries; attempt++) {
          try {
            const response = await fetch("/api/tts/generate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text }),
              signal: controller.signal,
            });
            if (!response.ok) throw new Error("TTS 생성 실패");
            return response.blob();
          } catch (err) {
            lastErr = err;
            if (attempt >= retries) break;
            await new Promise((resolve) => setTimeout(resolve, 500));
          }
        }
        throw lastErr;
      }
      const blob = await fetchWithRetry(1);
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.volume = 1.0;
      audio.play().catch((err) => {
        console.error("TTS 재생 오류:", err);
      });
      audio.addEventListener("ended", () => {
        URL.revokeObjectURL(url);
      });
    } catch (err) {
      if (err?.name === "AbortError") {
        console.error("TTS 요청 시간 초과:", err);
      } else {
        console.error("TTS 오류:", err);
      }
      return;
    } finally {
      clearTimeout(timeoutId);
      if (playButtonEl) {
        playButtonEl.disabled = false;
        playButtonEl.classList.remove("opacity-70");
        playButtonEl.textContent = originalLabel || "▶ 발음 듣기";
      }
    }
  }

  async function startRecording() {
    if (recorder && recorder.state === "recording") return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = (event) => {
        if (event.data.size > 0) recordedChunks.push(event.data);
      };
      recorder.onstop = () => {
        recordedAudioBlob = new Blob(recordedChunks, { type: "audio/webm" });
        stream.getTracks().forEach((track) => track.stop());
      };
      recorder.start();
      recordStartEl.disabled = true;
      recordStopEl.disabled = false;
    } catch (err) {
      console.error("녹음 시작 오류:", err);
      AlertManager.error("마이크 권한을 확인해 주세요.", "마이크 오류", document.getElementById("alertsContainer"));
    }
  }

  function stopRecording() {
    if (!recorder || recorder.state !== "recording") return;
    recorder.stop();
    recordStartEl.disabled = false;
    recordStopEl.disabled = true;
  }

  function renderHistoryChart(sentenceId) {
    const history = getHistory(sentenceId).slice(0, 10).reverse();
    if (!history.length) {
      historyChartEl.innerHTML =
        "<div class='h-full flex items-center justify-center text-sm text-gray-400'>히스토리 데이터가 없습니다.</div>";
      return;
    }

    const width = 480;
    const height = 200;
    const padding = 32;
    const max = 100;
    const min = 0;
    const stepX = history.length > 1 ? (width - padding * 2) / (history.length - 1) : 0;

    const points = history.map((score, idx) => {
      const x = padding + idx * stepX;
      const y = height - padding - ((score - min) / (max - min)) * (height - padding * 2);
      return { x, y, score };
    });

    const polyline = points.map((p) => `${p.x},${p.y}`).join(" ");
    const circles = points
      .map(
        (p) =>
          `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#6366f1"></circle>`
      )
      .join("");
    const labels = points
      .map(
        (p) =>
          `<text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-size="10" fill="#6b7280">${p.score}</text>`
      )
      .join("");

    historyChartEl.innerHTML = `
      <svg viewBox="0 0 ${width} ${height}" class="w-full h-full">
        <rect x="0" y="0" width="${width}" height="${height}" fill="#f9fafb" />
        <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#e5e7eb" />
        <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#e5e7eb" />
        <polyline points="${polyline}" fill="none" stroke="#6366f1" stroke-width="2" />
        ${circles}
        ${labels}
      </svg>
    `;
  }

  async function loadScores() {
    const token = localStorage.getItem("auth_token");
    if (!token) return {};
    try {
      const res = await fetch("/api/learning/sentence-scores?limit=10", {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) return {};
      const data = await res.json();
      return data.scores || {};
    } catch (_) {
      return {};
    }
  }

  async function loadSentences() {
    try {
      const res = await fetch("/api/puzzle/sentences");
      if (!res.ok) throw new Error("문장 데이터를 불러오지 못했습니다.");
      const data = await res.json();
      sentences = data.sentences || [];
      scoreHistory = await loadScores();
      renderList();
      selectSentence(0);
    } catch (err) {
      listEl.innerHTML =
        "<div class='text-sm text-gray-500'>데이터를 불러오는 중 오류가 발생했습니다.</div>";
    }
  }

  async function submitScore() {
    const token = localStorage.getItem("auth_token");
    if (!token) {
      AlertManager.warning("로그인 후 점수를 입력할 수 있습니다.", "로그인 필요", document.getElementById("alertsContainer"));
      return;
    }

    const score = Number(scoreInputEl.value);
    if (Number.isNaN(score) || score < 0 || score > 100) {
      AlertManager.warning("0~100 사이 점수를 입력하세요.", "입력 오류", document.getElementById("alertsContainer"));
      return;
    }

    const sorted = getSortedSentences();
    const item = sorted[selectedIndex];
    if (!item) return;

    try {
      const res = await fetch("/api/learning/sentence-scores", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ sentence_id: item.id, score }),
      });
      if (!res.ok) throw new Error("점수 저장에 실패했습니다.");
      scoreHistory = await loadScores();
      scoreInputEl.value = "";
      renderList();
      selectSentence(selectedIndex);
    } catch (err) {
      AlertManager.error(err.message, "오류", document.getElementById("alertsContainer"));
    }
  }

  sortToggleEl.addEventListener("click", () => {
    sortByScore = !sortByScore;
    sortToggleEl.textContent = sortByScore
      ? "점수 높은 순 정렬"
      : "기본 순서";
    renderList();
    selectSentence(selectedIndex);
  });
  document.getElementById("applyScore").addEventListener("click", submitScore);

  playButtonEl?.addEventListener("click", () => {
    const sorted = getSortedSentences();
    const item = sorted[selectedIndex] || sorted[0];
    playTTS(item?.text || "");
  });
  recordStartEl?.addEventListener("click", startRecording);
  recordStopEl?.addEventListener("click", stopRecording);

  loadSentences();
</script>
{% endblock %}
