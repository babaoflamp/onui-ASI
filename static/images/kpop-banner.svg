<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="kpopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#kpopGrad)" />
  <circle cx="200" cy="200" r="150" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4" />
  <!-- Music Note -->
  <path d="M180 140 L240 120 L240 220 A 30 30 0 1 1 200 240 L200 155 L240 140" fill="white" filter="url(#glow)" />
  <!-- Sparkles -->
  <circle cx="120" cy="120" r="4" fill="white" filter="url(#glow)"/>
  <circle cx="280" cy="100" r="6" fill="white" filter="url(#glow)"/>
  <circle cx="100" cy="260" r="5" fill="white" filter="url(#glow)"/>
  <circle cx="280" cy="280" r="8" fill="white" filter="url(#glow)"/>
  <path d="M110 110 L130 130 M130 110 L110 130" stroke="white" stroke-width="2" filter="url(#glow)" />
  <path d="M270 90 L290 110 M290 90 L270 110" stroke="white" stroke-width="2" filter="url(#glow)" />
</svg>