<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bearGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#d97706" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bearGrad)" />
  <!-- Papa Bear -->
  <circle cx="130" cy="250" r="60" fill="#78350f" filter="url(#shadow)" />
  <circle cx="90" cy="200" r="20" fill="#78350f" />
  <circle cx="170" cy="200" r="20" fill="#78350f" />
  <!-- Mama Bear -->
  <circle cx="270" cy="250" r="55" fill="#b45309" filter="url(#shadow)" />
  <circle cx="230" cy="200" r="18" fill="#b45309" />
  <circle cx="310" cy="200" r="18" fill="#b45309" />
  <!-- Baby Bear -->
  <circle cx="200" cy="300" r="40" fill="#f59e0b" filter="url(#shadow)" />
  <circle cx="170" cy="265" r="15" fill="#f59e0b" />
  <circle cx="230" cy="265" r="15" fill="#f59e0b" />
  <!-- Text -->
  <text x="200" y="100" font-family="sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" style="text-shadow: 0 4px 8px rgba(0,0,0,0.4);">THREE BEARS</text>
  <text x="200" y="140" font-family="sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" opacity="0.8">곰 세 마리</text>
</svg>