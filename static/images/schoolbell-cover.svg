<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bellGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bellGrad)" />
  <!-- School Bell -->
  <path d="M150 250 L250 250 L230 180 C230 150, 170 150, 170 180 Z" fill="#fcd34d" filter="url(#shadow)" />
  <circle cx="200" cy="150" r="15" fill="#f59e0b" />
  <circle cx="200" cy="265" r="15" fill="#b45309" />
  <rect x="130" y="250" width="140" height="10" fill="#d97706" rx="5" />
  
  <!-- Text -->
  <text x="200" y="90" font-family="sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle" style="text-shadow: 0 4px 8px rgba(0,0,0,0.4);">SCHOOL BELL</text>
  <text x="200" y="130" font-family="sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" opacity="0.8">학교종</text>
</svg>