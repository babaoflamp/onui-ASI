<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bunnyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="100%" stop-color="#15803d" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bunnyGrad)" />
  <!-- Bunny Body -->
  <ellipse cx="200" cy="280" rx="60" ry="70" fill="white" filter="url(#shadow)" />
  <!-- Bunny Ears -->
  <ellipse cx="170" cy="180" rx="15" ry="60" fill="white" transform="rotate(-15 170 180)" filter="url(#shadow)" />
  <ellipse cx="230" cy="180" rx="15" ry="60" fill="white" transform="rotate(15 230 180)" filter="url(#shadow)" />
  <ellipse cx="170" cy="180" rx="8" ry="40" fill="#fbcfe8" transform="rotate(-15 170 180)" />
  <ellipse cx="230" cy="180" rx="8" ry="40" fill="#fbcfe8" transform="rotate(15 230 180)" />
  <!-- Bunny Face -->
  <circle cx="180" cy="260" r="5" fill="#1e293b" />
  <circle cx="220" cy="260" r="5" fill="#1e293b" />
  <path d="M195 270 Q200 275 205 270" stroke="#f43f5e" stroke-width="3" fill="none" stroke-linecap="round" />
  <!-- Text -->
  <text x="200" y="80" font-family="sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle" style="text-shadow: 0 4px 8px rgba(0,0,0,0.4);">MOUNTAIN RABBIT</text>
  <text x="200" y="120" font-family="sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" opacity="0.8">산토끼</text>
</svg>