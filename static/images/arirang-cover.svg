<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Background Gradient: Deep Night Sky / Midnight Blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <!-- Red & Blue Gradients for Taegeuk elements -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)" />
  
  <!-- Subtle Grid/Pattern Overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="800" fill="url(#grid)" />

  <!-- Central Circular Design (Represents the Moon / Harmony) -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  <circle cx="400" cy="400" r="280" fill="none" stroke="rgba(255,255,255,0.1)" stroke-dasharray="10 15" stroke-width="4" />

  <!-- Abstract Taegeuk-inspired curves -->
  <path d="M 200 400 C 200 200, 600 200, 600 400" fill="none" stroke="url(#redGrad)" stroke-width="40" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 200 400 C 200 600, 600 600, 600 400" fill="none" stroke="url(#blueGrad)" stroke-width="40" stroke-linecap="round" filter="url(#glow)" />

  <!-- Typography -->
  <text x="400" y="380" font-family="sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" letter-spacing="8" style="text-shadow: 0 10px 20px rgba(0,0,0,0.8);">ARIRANG</text>
  <text x="400" y="460" font-family="sans-serif" font-size="24" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="12">KOREAN TRADITIONAL</text>
  
  <!-- Decorative elements -->
  <circle cx="400" cy="650" r="8" fill="white" />
  <circle cx="400" cy="150" r="8" fill="white" />
</svg>