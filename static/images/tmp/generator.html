<!DOCTYPE html>
<html>
<head>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .canvas-container {
    width: 800px; height: 800px;
    background-color: #0f172a;
    background-image: 
      radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%),
      repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px);
    position: relative;
    overflow: hidden;
  }
  .pattern {
    position: absolute;
    width: 200%; height: 200%;
    top: -50%; left: -50%;
    background-image: 
      conic-gradient(from 0deg at 50% 50%, #dc2626 0deg, #dc2626 90deg, #2563eb 90deg, #2563eb 180deg, #eab308 180deg, #eab308 270deg, #16a34a 270deg, #16a34a 360deg);
    opacity: 0.8;
    mask-image: radial-gradient(circle, black 30%, transparent 70%);
    -webkit-mask-image: radial-gradient(circle, black 30%, transparent 70%);
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; font-family: sans-serif;
    text-shadow: 0 4px 8px rgba(0,0,0,0.5);
  }
  .title { font-size: 80px; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; }
  .subtitle { font-size: 30px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: #cbd5e1; }
  .circle-inner { width: 400px; height: 400px; border-radius: 50%; border: 8px solid rgba(255,255,255,0.2); position: absolute; }
</style>
</head>
<body>
  <div id="capture" class="canvas-container">
    <div class="pattern"></div>
    <div class="circle-inner"></div>
    <div class="overlay">
      <div class="title">ARIRANG</div>
      <div class="subtitle">Korean Traditional</div>
    </div>
  </div>
</body>
</html>
