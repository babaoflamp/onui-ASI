<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#bg)" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="800" fill="url(#grid)" />

  <circle cx="400" cy="400" r="300" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  <circle cx="400" cy="400" r="280" fill="none" stroke="rgba(255,255,255,0.1)" stroke-dasharray="10 15" stroke-width="4" />

  <path d="M 200 400 C 200 200, 600 200, 600 400" fill="none" stroke="url(#greenGrad)" stroke-width="35" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 200 400 C 200 600, 600 600, 600 400" fill="none" stroke="url(#goldGrad)" stroke-width="35" stroke-linecap="round" filter="url(#glow)" />

  <text x="400" y="380" font-family="sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6" style="text-shadow: 0 10px 20px rgba(0,0,0,0.8);">올레길</text>
  <text x="400" y="460" font-family="sans-serif" font-size="24" font-weight="400" fill="#bae6fd" text-anchor="middle" letter-spacing="8">JEU OLLE TRAIL</text>
  
  <circle cx="400" cy="650" r="8" fill="white" />
  <circle cx="400" cy="150" r="8" fill="white" />
</svg>