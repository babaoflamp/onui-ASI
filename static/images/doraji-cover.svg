<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="dorajiGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="100%" stop-color="#7e22ce" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#dorajiGrad)" />
  <!-- Traditional Ribbon / Curves -->
  <path d="M50 250 C150 100, 250 350, 350 200" stroke="rgba(255,255,255,0.4)" stroke-width="20" fill="none" stroke-linecap="round" filter="url(#shadow)" />
  <path d="M100 300 C200 150, 300 400, 380 250" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Text -->
  <text x="200" y="120" font-family="sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle" style="text-shadow: 0 4px 8px rgba(0,0,0,0.4);">DORAJI</text>
  <text x="200" y="160" font-family="sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" opacity="0.8">도라지 타령</text>
</svg>