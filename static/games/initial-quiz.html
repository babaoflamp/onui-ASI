<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초성 퀴즈 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; }
        .font-jua { font-family: 'Jua', sans-serif; }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        #quiz-initials { min-height: 1.2em; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="landing-page" class="fixed inset-0 bg-emerald-600 z-[100] flex flex-col items-center justify-center p-6 text-center text-white">
        <div class="bg-white/20 p-8 rounded-3xl backdrop-blur-md shadow-2xl max-w-lg w-full">
            <h1 class="text-5xl md:text-6xl font-jua mb-4 text-white text-center">초성 퀴즈 마스터</h1>
            <p class="text-lg md:text-xl mb-8 opacity-90 leading-relaxed text-center">
                제시된 초성을 보고 단어를 맞히세요!<br>
                틀린 단어의 뜻과 예문도 함께 배울 수 있습니다.
            </p>
            <div class="flex justify-center">
                <button onclick="startGame()" class="bg-white text-emerald-600 text-2xl font-jua px-12 py-4 rounded-full hover:bg-emerald-50 transition-all shadow-lg active:scale-95">
                    학습 시작하기
                </button>
            </div>
        </div>
    </div>

    <header class="w-full max-w-2xl flex items-center justify-between mb-6 mt-4">
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="bg-white px-4 py-2 rounded-xl text-emerald-600 font-bold hover:bg-emerald-50 transition-colors shadow-sm border border-emerald-100 flex items-center gap-2">
                <i data-lucide="home" class="w-5 h-5"></i>
                처음으로
            </button>
            <div class="bg-emerald-600 text-white px-4 py-2 rounded-2xl font-jua text-xl shadow-md">
                Stage <span id="current-stage-display">1</span>
            </div>
        </div>
        <div class="flex gap-4 bg-white px-6 py-2 rounded-2xl shadow-sm border border-emerald-100 font-bold text-emerald-700">
            <span id="timer-display">00:00</span>
            <span id="progress-display">0/7</span>
        </div>
    </header>

    <main id="quiz-container" class="w-full max-w-2xl bg-white rounded-3xl p-8 shadow-xl border border-emerald-50">
        <div class="text-center mb-8">
            <p class="text-gray-400 text-sm mb-2 uppercase tracking-widest text-center">글자 수와 초성이 일치하는 단어는?</p>
            <h2 id="quiz-initials" class="text-6xl md:text-7xl font-jua text-emerald-600 tracking-widest mb-4 text-center"></h2>
        </div>
        <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <div id="feedback-popup" class="fixed inset-0 bg-black/50 z-[110] flex items-center justify-center p-4 hidden backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl">
            <div id="feedback-icon-container" class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h3 id="feedback-title" class="text-3xl font-jua text-center mb-4">정답입니다!</h3>
            
            <div class="bg-gray-50 p-6 rounded-2xl mb-6 text-center border border-gray-100">
                <p class="font-bold text-emerald-700 text-2xl mb-2" id="info-word">단어</p>
                <p class="text-gray-600 text-base mb-4 leading-relaxed" id="info-meaning">뜻</p>
                <div class="border-t border-gray-200 pt-4">
                    <p class="text-gray-700 italic text-sm leading-relaxed" id="info-example">"예문"</p>
                </div>
            </div>

            <button id="feedback-close-btn" class="w-full bg-emerald-600 text-white font-jua py-4 rounded-xl text-xl hover:bg-emerald-700 transition-colors">확인</button>
        </div>
    </div>

    <div id="stage-clear-popup" class="fixed inset-0 bg-emerald-600/90 z-[115] flex items-center justify-center p-4 hidden backdrop-blur-md">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-yellow-400 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i data-lucide="award" class="w-12 h-12 text-white"></i>
            </div>
            <h2 class="text-3xl font-jua text-gray-800 mb-2 text-center">Stage Clear!</h2>
            <p id="stage-clear-msg" class="text-gray-600 mb-6 text-center">스테이지를 완료했습니다.</p>
            <button onclick="startNextStage()" class="w-full bg-emerald-600 text-white font-jua py-4 rounded-xl text-xl">다음 단계 시작</button>
        </div>
    </div>

    <div id="result-page" class="fixed inset-0 bg-white z-[120] flex flex-col items-center justify-center p-6 hidden overflow-y-auto">

    </div>

        };

        const quizData = [
            { initials: "ㅅㄱ", answer: "사과", options: ["사과", "바다", "하늘", "나무"] },

            { initials: "ㅅㅌ", answer: "사탕", options: ["기차", "사탕", "버스", "구름"] },

            { initials: "ㅊㄱ", answer: "친구", options: ["사과", "나무", "친구", "바다"] },
            { initials: "ㄴㅂ", answer: "나비", options: ["나비", "기차", "우유", "모자"] },
            { initials: "ㅇㅅ", answer: "우산", options: ["거울", "우산", "친구", "사탕"] },

        ];

        let stage = 1, qIdx = 0, totalQIdx = 0, totalStartTime = 0, stageStartTime = 0;
        let stageReports = [], stageAttempts = 0, timerInterval;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'correct') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e) {}
        }

        function startGame() {
            document.getElementById('landing-page').style.display = 'none';
            totalStartTime = Date.now();
            stageStartTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimeText, 1000);
            renderQuiz();
        }

        function updateTimeText() {
            const diff = Math.floor((Date.now() - totalStartTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        function renderQuiz() {
            if (totalQIdx >= quizData.length) return;
            const data = quizData[totalQIdx];

            document.getElementById('current-stage-display').innerText = stage;
            document.getElementById('progress-display').innerText = `${qIdx}/7`;
            document.getElementById('quiz-initials').innerText = data.initials;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            const shuffled = [...data.options].sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-emerald-100 p-5 rounded-2xl text-xl font-bold text-gray-700 shadow-sm transition-all hover:border-emerald-500 hover:bg-emerald-50 active:scale-95";
                btn.innerText = opt;
                btn.onclick = () => onOptionClick(opt, btn);
                grid.appendChild(btn);
            });

            if (window.lucide) lucide.createIcons();
        }

        function onOptionClick(selected, btn) {
            const data = quizData[totalQIdx];
            stageAttempts++;
            const isCorrect = selected === data.answer;

            if (isCorrect) {
                playSfx('correct');
                showFeedbackPopup(true, selected);
            } else {
                playSfx('wrong');
                btn.classList.add('bg-red-500', 'text-white', 'border-red-500', 'shake');
                btn.disabled = true;
                showFeedbackPopup(false, selected);
            }
        }

        function showFeedbackPopup(isCorrect, word) {
            const popup = document.getElementById('feedback-popup');
            const icon = document.getElementById('feedback-icon-container');
            const title = document.getElementById('feedback-title');
            const btn = document.getElementById('feedback-close-btn');
            const wordData = dictionary[word] || { m: "정보가 없습니다.", e: "" };

            popup.classList.remove('hidden');
            document.getElementById('info-word').innerText = word;
            document.getElementById('info-meaning').innerText = wordData.m;
            document.getElementById('info-example').innerText = wordData.e ? `"${wordData.e}"` : "";

            if (isCorrect) {
                icon.className = "w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-emerald-500";
                icon.innerHTML = '<i data-lucide="check" class="text-white w-12 h-12"></i>';
                title.innerText = "정답입니다!";
                title.className = "text-3xl font-jua text-center mb-2 text-emerald-600";
                if (window.confetti) confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
                btn.onclick = () => { popup.classList.add('hidden'); goToNext(); };
            } else {
                icon.className = "w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 bg-red-500";
                icon.innerHTML = '<i data-lucide="x" class="text-white w-12 h-12"></i>';
                title.innerText = "틀렸습니다!";
                title.className = "text-3xl font-jua text-center mb-2 text-red-600";
                btn.onclick = () => { popup.classList.add('hidden'); };
            }
            if (window.lucide) lucide.createIcons();
        }

        function goToNext() {
            qIdx++;
            totalQIdx++;
            if (qIdx >= 7) {
                const timeTaken = Math.floor((Date.now() - stageStartTime) / 1000);
                stageReports.push({ stage, time: timeTaken, acc: Math.round((7 / stageAttempts) * 100) });
                if (stage >= 5) {
                    clearInterval(timerInterval);
                    showFinalResult();
                } else {
                    showStageClearPopup();
                }
            } else {
                renderQuiz();
            }
        }

        function showStageClearPopup() {
            document.getElementById('stage-clear-msg').innerText = `스테이지 ${stage} 완료!`;
            document.getElementById('stage-clear-popup').classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
        }

        function startNextStage() {
            document.getElementById('stage-clear-popup').classList.add('hidden');
            stage++;
            qIdx = 0;
            stageAttempts = 0;
            stageStartTime = Date.now();
            renderQuiz();
        }

        function showFinalResult() {
            document.getElementById('result-page').classList.remove('hidden');
            const container = document.getElementById('stage-reports-container');
            container.innerHTML = '';
            stageReports.forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-emerald-50 p-5 rounded-2xl flex justify-between items-center shadow-sm border border-emerald-100";
                div.innerHTML = `<div class="font-jua text-2xl text-emerald-800">Stage ${r.stage}</div>
                    <div class="text-right">
                        <p class="text-gray-500 text-sm">시간: ${r.time}초</p>
                        <p class="text-gray-500 text-sm">정답률: ${r.acc}%</p>
                    </div>`;
                container.appendChild(div);
            });
        }

        window.onload = () => {
            if (window.lucide) lucide.createIcons();
        };
    </script>
</body>
</html>
