<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단어 퀴즈 - 학습형 재도전</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap');

  :root {
    --primary-color: #6c5ce7;
    --secondary-color: #a29bfe;
    --bg-gradient: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
    --card-bg: #ffffff;
    --text-color: #2d3436;
    --correct-color: #00b894;
    --wrong-color: #ff7675;
    --btn-pause: #fdcb6e;
    --btn-end: #636e72;
    --btn-restart: #0984e3;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-gradient);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: var(--text-color);
    overflow: hidden;
  }

  /* 랜딩 페이지 */
  .landing-page {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.95);
    z-index: 200;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: opacity 0.5s ease;
  }
  
  .landing-icon { font-size: 5rem; margin-bottom: 20px; animation: bounce 2s infinite; }
  .landing-title {
    font-family: 'Jua', sans-serif;
    font-size: 3.5rem;
    color: var(--primary-color);
    margin-bottom: 10px;
    text-shadow: 2px 2px 0px #a29bfe;
  }
  .landing-subtitle { font-size: 1.2rem; color: #636e72; margin-bottom: 40px; }

  .btn-start {
    background-color: var(--primary-color);
    color: white;
    font-size: 1.5rem;
    padding: 15px 60px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-family: 'Jua', sans-serif;
    box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
    transition: transform 0.2s;
  }
  .btn-start:hover { transform: scale(1.05); }

  /* 게임 컨테이너 */
  .game-container {
    width: 90%;
    max-width: 600px;
    background-color: var(--card-bg);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    position: relative;
  }

  .header-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-weight: bold;
    color: #636e72;
  }
  
  .stage-badge {
    background-color: var(--primary-color);
    color: white;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 0.9em;
    font-family: 'Jua', sans-serif;
  }

  .hearts { font-size: 1.5em; letter-spacing: 2px; }

  /* 힌트 박스 */
  .hint-box {
    background-color: #f1f2f6;
    color: #2d3436;
    padding: 25px;
    border-radius: 20px;
    font-size: 1.3em;
    font-weight: 700;
    margin-bottom: 25px;
    text-align: center;
    line-height: 1.4;
    word-break: keep-all;
    border: 3px solid #dfe6e9;
    position: relative;
  }
  
  .category-label {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    background: var(--primary-color);
    color: white;
    font-size: 0.8rem;
    padding: 3px 12px;
    border-radius: 10px;
  }

  /* 보기 버튼 */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 30px;
  }

  .choice {
    background-color: #ffffff;
    border: 3px solid #f1f2f6;
    border-radius: 15px;
    height: 90px; 
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 1.3em;
    font-weight: bold;
    color: #636e72;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }

  .choice:hover:not(.wrong):not(.correct) {
    border-color: var(--secondary-color);
    background-color: #f8f9fa;
    transform: translateY(-3px);
  }

  /* 오답 버튼 스타일 */
  .choice.wrong {
    background-color: #ffeaea;
    border-color: var(--wrong-color);
    color: var(--wrong-color);
    animation: shake 0.4s;
    cursor: not-allowed;
    opacity: 0.8;
  }

  /* 정답 버튼 스타일 */
  .choice.correct {
    background-color: #e6fffa;
    border-color: var(--correct-color);
    color: var(--correct-color);
    animation: bounce 0.4s;
  }

  /* 하단 버튼 */
  .control-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
  }
  .control-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-pause { background-color: var(--btn-pause); color: #2d3436; }
  .btn-restart { background-color: var(--btn-restart); }
  .btn-end { background-color: var(--btn-end); }

  /* 팝업 오버레이 */
  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .popup-card {
    background: white;
    padding: 30px;
    border-radius: 25px;
    width: 85%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    border: 4px solid transparent; /* 테두리 공간 확보 */
  }

  /* 팝업 테두리 색상 (상태별) */
  .popup-card.correct-mode { border-color: var(--correct-color); }
  .popup-card.wrong-mode { border-color: var(--wrong-color); }

  .popup-emoji { font-size: 4rem; margin-bottom: 10px; display: block; }
  .popup-title { font-size: 2rem; font-weight: 900; font-family: 'Jua', sans-serif; margin-bottom: 10px; color: var(--text-color); }
  
  .popup-card.correct-mode .popup-title { color: var(--correct-color); }
  .popup-card.wrong-mode .popup-title { color: var(--wrong-color); }

  /* 설명 박스 */
  .explanation-box {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    border: 2px solid #edf2f7;
    text-align: left;
  }
  .exp-label {
    font-size: 0.8rem; font-weight: bold; color: #b2bec3; margin-bottom: 5px; display: block;
  }
  .exp-word { font-size: 1.5rem; color: var(--primary-color); font-weight: bold; margin-bottom: 5px; }
  .exp-meaning { font-size: 1rem; color: #636e72; }

  /* 통계 그리드 */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    background: #f1f2f6;
    padding: 15px;
    border-radius: 15px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    font-size: 0.9rem;
    color: #636e72;
  }
  .stat-value {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--text-color);
  }

  .btn-action {
    background-color: var(--primary-color);
    color: white;
    border: none;
    padding: 15px 40px;
    border-radius: 30px;
    font-size: 1.2rem;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Jua', sans-serif;
    box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
    transition: transform 0.2s;
    width: 100%;
  }
  .btn-action:hover { transform: scale(1.03); }
  
  /* 버튼 색상 변경용 클래스 */
  .btn-retry { background-color: var(--wrong-color); box-shadow: 0 5px 15px rgba(255, 118, 117, 0.3); }

  @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

</style>
</head>
<body>

<div class="landing-page" id="landingPage">
  <div class="landing-icon">🎓</div>
  <div class="landing-title">단어 퀴즈 왕</div>
  <p class="landing-subtitle">뜻을 읽고 알맞은 단어를 맞춰보세요!</p>
  <button class="btn-start" onclick="enterGame()">게임 시작 ▶</button>
</div>

<div class="game-container" id="gameContainer">
  <div class="header-info">
    <div class="stage-badge" id="stageDisplay">STAGE 1</div>
    <div class="hearts" id="hearts">❤️❤️❤️</div>
  </div>

  <div class="hint-box" id="hint">
    <div class="category-label">카테고리</div>
    <span id="hintText">문제 로딩 중...</span>
  </div>

  <div class="choices" id="choices"></div>

  <div class="control-bar">
    <button class="control-btn btn-pause" onclick="togglePause()">일시 정지</button>
    <button class="control-btn btn-restart" onclick="restartGame()">다시 하기</button>
    <button class="control-btn btn-end" onclick="endGame()">종료</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup-card" id="popupCard">
      <span class="popup-emoji" id="popupEmoji">🎉</span>
      <div class="popup-title" id="popupTitle">정답!</div>
      
      <div class="explanation-box" id="explanationBox">
        <span class="exp-label" id="expLabel">단어 뜻</span>
        <div class="exp-word" id="expWord">단어</div>
        <div class="exp-meaning" id="expMeaning">뜻 설명</div>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-item">
          <span>현재 점수</span>
          <span class="stat-value" style="color:var(--primary-color)" id="statScore">0</span>
        </div>
        <div class="stat-item">
          <span>맞춘 문제</span>
          <span class="stat-value" style="color:var(--correct-color)" id="statCorrect">0</span>
        </div>
        <div class="stat-item">
          <span>틀린 횟수</span>
          <span class="stat-value" style="color:var(--wrong-color)" id="statWrong">0</span>
        </div>
        <div class="stat-item">
          <span>전체 문제</span>
          <span class="stat-value" id="statTotal">10</span>
        </div>
      </div>

      <div id="popupDesc" style="display:none; margin-bottom:20px; color:#636e72;"></div>
      
      <button class="btn-action" id="popupBtn">다음 문제</button>
    </div>
  </div>
</div>

<audio id="correctSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bb630cc098.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73467.mp3"></audio>
<audio id="clearSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>

<script>
// 데이터
const words = [
  {word:"숟가락", meaning:"음식을 먹을 때 사용하는 도구", category:"도구"},
  {word:"책상", meaning:"공부나 일을 하는 가구", category:"가구"},
  {word:"학교", meaning:"학생들이 공부하는 장소", category:"장소"},
  {word:"우유", meaning:"소에서 얻는 하얀 음료", category:"음식"},
  {word:"컴퓨터", meaning:"인터넷과 문서 작업을 하는 전자기기", category:"기기"},
  {word:"자동차", meaning:"사람이나 짐을 싣고 도로를 달리는 차", category:"교통"},
  {word:"가족", meaning:"부모와 자식 등 혈연으로 맺어진 관계", category:"사람"},
  {word:"사과", meaning:"빨갛고 동그란 달콤한 과일", category:"음식"},
  {word:"의사", meaning:"아픈 사람을 치료해 주는 사람", category:"직업"},
  {word:"공원", meaning:"산책하거나 쉴 수 있는 야외 공간", category:"장소"},
  {word:"비행기", meaning:"하늘을 날아다니는 교통수단", category:"교통"},
  {word:"연필", meaning:"종이에 글씨를 쓰는 도구", category:"문구"},
  {word:"소방관", meaning:"불을 끄고 사람을 구하는 직업", category:"직업"},
  {word:"도서관", meaning:"책을 읽거나 빌릴 수 있는 곳", category:"장소"},
  {word:"자전거", meaning:"두 발로 페달을 밟아 움직이는 탈것", category:"교통"}
];

let maxHearts = 3;
let hearts;
let currentStage = 1;
const maxStages = 10;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let currentWord; 
let gameActive = true;
let isPaused = false;

// DOM Elements
const landingPage = document.getElementById("landingPage");
const gameContainer = document.getElementById("gameContainer");
const choicesContainer = document.getElementById("choices");
const hintText = document.getElementById("hintText");
const categoryLabel = document.querySelector(".category-label");
const heartsContainer = document.getElementById("hearts");
const stageDisplay = document.getElementById("stageDisplay");

// Popup Elements
const overlay = document.getElementById("overlay");
const popupCard = document.getElementById("popupCard");
const popupTitle = document.getElementById("popupTitle");
const popupEmoji = document.getElementById("popupEmoji");
const explanationBox = document.getElementById("explanationBox");
const expLabel = document.getElementById("expLabel");
const expWord = document.getElementById("expWord");
const expMeaning = document.getElementById("expMeaning");
const popupBtn = document.getElementById("popupBtn");
const popupDesc = document.getElementById("popupDesc");
const statsGrid = document.getElementById("statsGrid");

// Stat Elements
const statScore = document.getElementById("statScore");
const statCorrect = document.getElementById("statCorrect");
const statWrong = document.getElementById("statWrong");
const statTotal = document.getElementById("statTotal");

// Sounds
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clearSound = document.getElementById("clearSound");

correctSound.volume = 0.5;
wrongSound.volume = 0.4;
clearSound.volume = 0.5;

function enterGame() {
  landingPage.style.opacity = '0';
  setTimeout(() => {
    landingPage.style.display = 'none';
    gameContainer.style.display = 'flex';
    restartGame();
  }, 500);
}

function restartGame() {
  hearts = maxHearts;
  currentStage = 1;
  score = 0;
  correctCount = 0;
  wrongCount = 0;
  gameActive = true;
  isPaused = false;
  
  hidePopup();
  updateUI();
  nextWord();
}

function updateUI() {
  heartsContainer.innerHTML = "";
  for(let i=0; i<hearts; i++){
    heartsContainer.innerHTML += '❤️';
  }
  for(let i=hearts; i<maxHearts; i++){
    heartsContainer.innerHTML += '<span style="opacity:0.3; filter:grayscale(1);">❤️</span>';
  }
  stageDisplay.innerText = `STAGE ${currentStage}`;
}

function nextWord() {
  if (currentStage > maxStages) {
    showEndPopup(true);
    return;
  }

  gameActive = true;
  hidePopup();
  choicesContainer.innerHTML = "";
  
  currentWord = words[Math.floor(Math.random()*words.length)];
  
  hintText.innerText = currentWord.meaning;
  categoryLabel.innerText = currentWord.category;

  // 보기 생성
  let choices = [currentWord];
  while(choices.length < 4){
    let rand = words[Math.floor(Math.random()*words.length)];
    if(!choices.find(w => w.word === rand.word)) choices.push(rand);
  }
  choices.sort(() => Math.random() - 0.5);

  choices.forEach(item => {
    let btn = document.createElement("div");
    btn.classList.add("choice");
    btn.innerText = item.word;
    btn.onclick = (e) => checkAnswer(item, e.target);
    choicesContainer.appendChild(btn);
  });
  
  updateUI();
}

function checkAnswer(selectedObj, btnElement) {
  if (!gameActive || isPaused) return;
  if (btnElement.classList.contains('wrong')) return; // 이미 틀린 건 클릭 무시

  if (selectedObj.word === currentWord.word) {
    // [정답]
    gameActive = false;
    btnElement.classList.add('correct');
    score += 10;
    correctCount++;
    correctSound.currentTime = 0;
    correctSound.play();
    
    showCorrectPopup();

  } else {
    // [오답] -> 팝업 띄우고 재도전 기회
    btnElement.classList.add('wrong'); // 빨간색 처리
    hearts--;
    wrongCount++;
    wrongSound.currentTime = 0;
    wrongSound.play();
    
    updateUI();

    if (hearts <= 0) {
      gameActive = false;
      showEndPopup(false);
    } else {
      // 오답 학습 팝업 띄우기 (재도전)
      showWrongPopup(selectedObj);
    }
  }
}

// (1) 정답 팝업
function showCorrectPopup() {
  overlay.classList.add("show");
  popupCard.className = "popup-card correct-mode";
  
  popupEmoji.innerText = "🎉";
  popupTitle.innerText = "정답입니다!";
  
  explanationBox.style.display = "block";
  expLabel.innerText = "정답 단어 뜻";
  expWord.innerText = currentWord.word;
  expMeaning.innerText = currentWord.meaning;

  // 통계 업데이트
  statsGrid.style.display = "grid";
  statScore.innerText = score;
  statCorrect.innerText = correctCount;
  statWrong.innerText = wrongCount;
  statTotal.innerText = maxStages;

  popupDesc.style.display = "none";
  
  popupBtn.className = "btn-action";
  popupBtn.innerText = "다음 문제";
  popupBtn.onclick = () => {
    currentStage++;
    nextWord();
  };
}

// (2) 오답 팝업 (학습 후 재도전)
function showWrongPopup(wrongObj) {
  overlay.classList.add("show");
  popupCard.className = "popup-card wrong-mode";
  
  popupEmoji.innerText = "🤔";
  popupTitle.innerText = "오답입니다";
  
  explanationBox.style.display = "block";
  expLabel.innerText = "선택한 단어 뜻";
  expWord.innerText = wrongObj.word;
  expMeaning.innerText = wrongObj.meaning; // 내가 고른 오답의 뜻 알려줌

  statsGrid.style.display = "none"; // 오답일 땐 통계 가림 (집중 위해)
  popupDesc.style.display = "block";
  popupDesc.innerText = "단어의 뜻을 확인하고 다시 풀어보세요!";

  popupBtn.className = "btn-action btn-retry";
  popupBtn.innerText = "다시 풀기";
  popupBtn.onclick = () => {
    hidePopup();
    // 게임은 계속 active 상태 (오답 버튼은 이미 빨간색이라 클릭 안됨, 나머지 중에서 고르면 됨)
  };
}

function showEndPopup(isClear) {
  overlay.classList.add("show");
  popupCard.className = "popup-card";
  explanationBox.style.display = "none";
  statsGrid.style.display = "grid"; 
  
  statScore.innerText = score;
  statCorrect.innerText = correctCount;
  statWrong.innerText = wrongCount;
  statTotal.innerText = maxStages;

  popupDesc.style.display = "block";

  if(isClear) {
    clearSound.play();
    popupEmoji.innerText = "🏆";
    popupTitle.innerText = "클리어 성공!";
    popupDesc.innerText = "축하합니다! 모든 문제를 풀었습니다.";
    popupBtn.className = "btn-action";
    popupBtn.innerText = "처음으로";
    popupBtn.onclick = restartGame;
  } else {
    popupEmoji.innerText = "😢";
    popupTitle.innerText = "게임 오버";
    popupDesc.innerText = "하트가 부족해요.";
    popupBtn.className = "btn-action";
    popupBtn.innerText = "다시 도전";
    popupBtn.onclick = restartGame;
  }
}

function togglePause() {
  if(landingPage.style.display !== 'none') return;

  isPaused = !isPaused;
  if(isPaused) {
    overlay.classList.add("show");
    popupCard.className = "popup-card";
    
    popupEmoji.innerText = "⏸️";
    popupTitle.innerText = "일시 정지";
    
    explanationBox.style.display = "none";
    statsGrid.style.display = "none";
    popupDesc.style.display = "block";
    popupDesc.innerText = "잠시 쉬어가는 중입니다.";
    
    popupBtn.className = "btn-action";
    popupBtn.innerText = "계속 하기";
    popupBtn.onclick = togglePause;
  } else {
    hidePopup();
  }
}

function endGame() {
  if(confirm("정말 종료하시겠습니까?")) {
    location.reload();
  }
}

function hidePopup() {
  overlay.classList.remove("show");
}
</script>
</body>
</html>
